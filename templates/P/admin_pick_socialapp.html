{% extends "admin/base_site.html" %}
{% block content %}
<h1>Populate OAuth token from allauth</h1>

<p>Select which Social Application (provider) to look up tokens for:</p>

<form method="post">
  {% csrf_token %}

  {# Pass the selected service PKs through #}
  {% for obj in queryset %}
    <input type="hidden" name="_selected_action" value="{{ obj.pk }}">
  {% endfor %}
  <input type="hidden" name="action" value="{{ action }}">

  <p>
    <label for="social_app_id"><strong>Social Application:</strong></label>
    <select name="social_app_id" id="social_app_id">
      {% for app in social_apps %}
        <option value="{{ app.pk }}">{{ app.name }} ({{ app.provider }})</option>
      {% endfor %}
    </select>
  </p>

  <p>
    <input type="submit" value="Populate tokens" class="default">
    <a href="../" class="button cancel-link">Cancel</a>
  </p>
</form>
{% endblock %}
